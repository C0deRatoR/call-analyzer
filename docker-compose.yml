version: "3.9"

services:
  call-analyzer:
    image: c0derator/call-analyzer:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: call-analyzer
    ports:
      - "5000:5000"
    environment:
      - API_KEY=${API_KEY}
      - SECRET_KEY=${SECRET_KEY:-call-analyzer-secret}
      - FLASK_ENV=production
    volumes:
      - uploads:/tmp/uploads
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  uploads:
